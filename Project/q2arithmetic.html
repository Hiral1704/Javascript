<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = 25;
        var b = 5;

        var add = a + b;
        var sub = a - b;
        var mul = a * b;
        var div = a / b;
        var mod = a % b;

        document.write("a & b total addition:- ", add ,"<br>");
        document.write("a & b total subtraction:- ", sub ,"<br>");
        document.write("a & b total multiplication:- ", mul ,"<br>");
        document.write("a & b total division:- ", div ,"<br>");
        document.write("a & b total modulus:- ", mod ,"<br>");
    
    </script>
</body>
</html>
