<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = 1234;
        var sum = 0;

        while (num > 0) {
            var r = num % 10;
            sum = sum + r;
            num = Math.floor(num / 10);
        }

        document.write("Sum of digits = " + sum);
    </script>
</body>

</html>
