<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = 1223456;
        var count = 0;

        while (num > 0) {
            count++;
            num = Math.floor(num / 10);
        }

        document.write("Total digits = " + count);
    </script>
</body>

</html>
