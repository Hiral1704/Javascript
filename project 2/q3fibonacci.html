<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var n = 10;
        var a = 0, b = 1;

        document.write("Fibonacci no: ");

        for (var i = 1; i <= n; i++) {
            document.write(a + " ");

            var c = a + b;
            a = b;
            b = c;
        }
    </script>
</body>

</html>
