<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = 157;
        var original = num;
        var sum = 0;

        while (num > 0) {
            var r = num % 10;
            sum = sum + (r * r * r);
            num = Math.floor(num / 10);
        }

        if (sum == original)
            document.write(original + " is Armstrong Number");
        else
            document.write(original + " is Not Armstrong Number");
    </script>
</body>

</html>
