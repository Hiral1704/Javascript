<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = 11;
        var flag = true;

        if (num <= 1) {
            flag = false;
        }

        for (var i = 2; i < num; i++) {
            if (num % i == 0) {
                flag = false;
                break;
            }
        }

        if (flag)
            document.write("Prime Number");
        else
            document.write("Not Prime Number");
    </script>
</body>

</html>
