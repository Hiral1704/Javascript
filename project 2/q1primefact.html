<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var num = 20;

        for (var i = 2; i <= num; i++) {
            while (num % i == 0) {
                num = num / i;
                document.write(i," ");
            }
        }
    </script>
</body>

</html>
