<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
        var source = [10, 20, 30, 40, 50];
        var dest = [];

        for (var i = 0; i < source.length; i++) 
        {
            dest[i] = source[i];
        }

        for (var i = 0; i < source.length; i++) 
        {
            document.write(source[i] + " ");
        }
        document.write("<br>copy element: ");
    
        for (var i = 0; i < dest.length; i++) 
        {
            document.write(dest[i] + " ");
        }

    </script>
</body>
</html>
